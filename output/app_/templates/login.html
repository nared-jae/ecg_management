<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - SMD ECG Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <style>
        .login-wrapper {
            background: linear-gradient(135deg, #e5e5ea 0%, #c7c7cc 50%, #d1d1d6 100%);
        }
        .login-lang-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border-radius: 980px;
            padding: 3px;
            gap: 2px;
        }
        .login-lang-btn {
            border: none;
            background: transparent;
            color: #86868b;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 0.25rem 0.75rem;
            border-radius: 980px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-family: 'Kanit', sans-serif;
            letter-spacing: 0.03em;
        }
        .login-lang-btn:hover { color: #1d1d1f; }
        .login-lang-btn.active {
            background: #0071e3;
            color: #fff;
            box-shadow: 0 1px 4px rgba(0, 113, 227, 0.3);
        }
        .login-card {
            position: relative;
        }
        .login-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #f5f5f7;
        }
        .login-footer-item {
            font-size: 0.75rem;
            color: #86868b;
        }
        .login-footer-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #d2d2d7;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Language Toggle -->
        <div class="login-lang-toggle">
            <button class="login-lang-btn" data-lang="th" onclick="setLoginLang('th')">TH</button>
            <button class="login-lang-btn" data-lang="en" onclick="setLoginLang('en')">EN</button>
        </div>

        <div class="login-card">
            <div class="login-logo">
                <i class="bi bi-heart-pulse"></i>
            </div>

            <h1>SMD ECG Management</h1>
            <p class="login-subtitle" data-login-i18n="subtitle">ระบบจัดการคลื่นไฟฟ้าหัวใจ</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-apple alert-{{ 'danger' if category == 'error' else category }} mb-3">
                            <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label" for="username" data-login-i18n="username_label">ชื่อผู้ใช้</label>
                    <input type="text" class="form-control" id="username" name="username"
                           data-login-i18n-placeholder="username_placeholder"
                           placeholder="กรอกชื่อผู้ใช้" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password" data-login-i18n="password_label">รหัสผ่าน</label>
                    <input type="password" class="form-control" id="password" name="password"
                           data-login-i18n-placeholder="password_placeholder"
                           placeholder="กรอกรหัสผ่าน" required>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-1"></i><span data-login-i18n="login_btn">เข้าสู่ระบบ</span>
                </button>
            </form>

            <div class="login-footer">
                <span class="login-footer-item">SMD Connex</span>
                <span class="login-footer-dot"></span>
                <span class="login-footer-item">ECG Management System</span>
                <span class="login-footer-dot"></span>
                <span class="login-footer-item" data-login-i18n="version">v1.0</span>
            </div>
        </div>
    </div>

    <script>
    var LOGIN_I18N = {
        th: {
            subtitle: 'ระบบจัดการคลื่นไฟฟ้าหัวใจ',
            username_label: 'ชื่อผู้ใช้',
            username_placeholder: 'กรอกชื่อผู้ใช้',
            password_label: 'รหัสผ่าน',
            password_placeholder: 'กรอกรหัสผ่าน',
            login_btn: 'เข้าสู่ระบบ',
            version: 'v1.0'
        },
        en: {
            subtitle: 'Electrocardiogram Management System',
            username_label: 'Username',
            username_placeholder: 'Enter username',
            password_label: 'Password',
            password_placeholder: 'Enter password',
            login_btn: 'Sign In',
            version: 'v1.0'
        }
    };

    function setLoginLang(lang) {
        localStorage.setItem('ecg_lang', lang);

        // Update text content
        document.querySelectorAll('[data-login-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-login-i18n');
            if (LOGIN_I18N[lang] && LOGIN_I18N[lang][key]) {
                el.textContent = LOGIN_I18N[lang][key];
            }
        });

        // Update placeholders
        document.querySelectorAll('[data-login-i18n-placeholder]').forEach(function(el) {
            var key = el.getAttribute('data-login-i18n-placeholder');
            if (LOGIN_I18N[lang] && LOGIN_I18N[lang][key]) {
                el.placeholder = LOGIN_I18N[lang][key];
            }
        });

        // Update toggle buttons
        document.querySelectorAll('.login-lang-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });
    }

    // Init on load
    document.addEventListener('DOMContentLoaded', function() {
        var lang = localStorage.getItem('ecg_lang') || 'en';
        setLoginLang(lang);
    });
    </script>
</body>
</html>
